<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교류 마켓 — 동서양 문화재 조사</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Malgun Gothic', '맑은 고딕', sans-serif; background: #F5EDD0; min-height: 100vh; }

.header {
  background: #6B3A0F; color: #F5EDD0; padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.header i { font-size: 22px; }
.header-title { font-size: 17px; font-weight: 600; }
.header-sub { font-size: 12px; opacity: .75; margin-top: 1px; }

.app { max-width: 720px; margin: 0 auto; padding: 1rem; }

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-btn {
  font-size: 13px; padding: 5px 13px; border-radius: 99px;
  border: 1.5px solid #C8A060; background: #FFFDF0;
  color: #6B3A0F; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
  transition: all .15s;
}
.filter-btn:hover { background: #FDF3D8; }
.filter-btn.active { background: #6B3A0F; color: #F5EDD0; border-color: #6B3A0F; }

.search-wrap { position: relative; margin-bottom: 1rem; }
.search-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #aaa; pointer-events: none; }
.search-wrap input {
  width: 100%; padding: 9px 12px 9px 36px; font-size: 14px;
  border: 1.5px solid #C8A060; border-radius: 10px;
  background: #FFFDF0; font-family: inherit; color: #2C1A08;
}
.search-wrap input:focus { outline: none; border-color: #6B3A0F; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }

.card {
  background: #FFFDF0; border: 1.5px solid #C8A060;
  border-radius: 12px; overflow: hidden; cursor: pointer;
  transition: transform .12s, box-shadow .12s;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(107,58,15,.18); }
.card:active { transform: scale(.98); }

.card-img {
  width: 100%; aspect-ratio: 4/3; overflow: hidden;
  background: #F0E6D0; display: flex; align-items: center; justify-content: center;
}
.card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-emoji { font-size: 38px; }

.card-body { padding: 9px 11px 11px; }
.card-cat {
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 99px; display: inline-block; margin-bottom: 5px;
}
.cat-s { background: #E6F1FB; color: #0C447C; }
.cat-f { background: #EAF3DE; color: #27500A; }
.cat-t { background: #FAEEDA; color: #633806; }
.card-title { font-size: 12px; font-weight: 600; color: #2C1A08; line-height: 1.4; margin-bottom: 3px; }
.card-origin { font-size: 11px; color: #7A5C2A; }
.route-row { display: flex; gap: 3px; margin-top: 5px; flex-wrap: wrap; }
.rb { font-size: 10px; padding: 2px 6px; border-radius: 99px; display: inline-flex; align-items: center; gap: 2px; }
.rb-land { background: #EAF3DE; color: #27500A; }
.rb-sea  { background: #E6F1FB; color: #0C447C; }

.empty { text-align: center; padding: 3rem; color: #7A5C2A; font-size: 14px; }

/* 모달 */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: none; align-items: flex-start; justify-content: center;
  z-index: 200; padding: 20px 12px; overflow-y: auto;
}
.overlay.open { display: flex; }
.modal {
  background: #FFFDF0; border-radius: 16px; width: 100%; max-width: 520px;
  border: 1.5px solid #C8A060; animation: up .18s ease;
  margin: auto 0;
}
@keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

.modal-hero {
  width: 100%; aspect-ratio: 16/7; overflow: hidden;
  background: #F0E6D0; border-radius: 14px 14px 0 0;
  display: flex; align-items: center; justify-content: center;
}
.modal-hero img { width: 100%; height: 100%; object-fit: cover; }
.modal-emoji { font-size: 64px; }

.modal-body { padding: 1.1rem 1.3rem 1.3rem; }
.modal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .9rem; gap: 10px; }
.modal-num { font-size: 11px; color: #7A5C2A; margin-bottom: 3px; }
.modal-title { font-size: 17px; font-weight: 700; color: #2C1A08; line-height: 1.3; }
.close-btn {
  background: #F5EDD0; border: 1.5px solid #C8A060; border-radius: 8px;
  padding: 6px 8px; cursor: pointer; font-size: 17px; flex-shrink: 0;
  display: flex; align-items: center; color: #6B3A0F;
}
.close-btn:hover { background: #EDD8A0; }

.meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.meta-tag {
  font-size: 12px; padding: 3px 10px; border-radius: 99px;
  background: #F5EDD0; color: #6B3A0F; border: 1px solid #C8A060;
  display: inline-flex; align-items: center; gap: 4px;
}

.section { margin-bottom: 1rem; }
.section-label {
  font-size: 11px; font-weight: 700; color: #6B3A0F;
  text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
}
.section-label i { font-size: 14px; }
.section-body {
  font-size: 14px; color: #2C1A08; line-height: 1.75;
  background: #F5EDD0; border-radius: 8px; padding: 10px 12px;
}
.promo-box {
  background: #FDF3D8; border-left: 3px solid #C8A060;
  border-radius: 0 8px 8px 0; padding: 10px 14px;
  font-size: 14px; color: #4A3010; line-height: 1.65; font-style: italic;
}

.nav-row {
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid #E0CBA0; padding-top: .9rem; margin-top: .9rem;
}
.nav-btn {
  font-size: 13px; padding: 7px 16px; border-radius: 8px;
  border: 1.5px solid #C8A060; background: #F5EDD0;
  color: #6B3A0F; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.nav-btn:hover { background: #EDD8A0; }
.nav-btn:disabled { opacity: .35; cursor: default; }
.nav-count { font-size: 13px; color: #7A5C2A; font-weight: 600; }

@media (max-width: 480px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .header-title { font-size: 15px; }
}
</style>
</head>

<div class="header">
  <i class="ti ti-map-2"></i>
  <div>
    <div class="header-title">교류 마켓 — 동서양 문화재 조사</div>
    <div class="header-sub">팍스 몽골리카 & 대항해 시대 · 14종</div>

  <div class="filter-row">

    <button class="filter-btn" data-cat="과학·지도"><i class="ti ti-compass"></i> 과학·지도</button>
    <button class="filter-btn" data-cat="음식·생활"><i class="ti ti-salad"></i> 음식·생활</button>
    <button class="filter-btn" data-cat="기술·예술"><i class="ti ti-palette"></i> 기술·예술</button>

  <div class="empty" id="empty" style="display:none">검색 결과가 없어요 🔍</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

    promo:"배고픔을 잊게 해줄 이 기적의 뿌리 작물을 전국의 농민들에게 보급할 권리를 사시겠습니까?" },
  { id:14, cat:"음식·생활", title:"담배의 전래", origin:"아메리카", era:"신항로 이후", route:["sea"], emoji:"🌿",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Tobacco-leaf.jpg/600px-Tobacco-leaf.jpg",
    bg:"신대륙에서 발견되어 전 세계로 퍼져나간 대표적인 기호품이에요. 사람들의 생활 습관을 바꾸고 대규모 플랜테이션 농업을 형성하게 하여 세계 경제 구조에 큰 영향을 미쳤습니다.",
    promo:"전 세계인의 습관을 지배하게 될 이 묘한 잎사귀의 유행을 당신은 미리 예측하셨나요?" },
];

let curCat="all", curRoute=null, filtered=[...DATA], curIdx=0;

const grid=document.getElementById("grid");
const overlay=document.getElementById("overlay");
const modal=document.getElementById("modal");
const searchEl=document.getElementById("search");

function catClass(c){ return c==="과학·지도"?"cat-s":c==="음식·생활"?"cat-f":"cat-t"; }
function rb(r){ return r==="land"?`<span class="rb rb-land"><i class="ti ti-route"></i>육로</span>`:`<span class="rb rb-sea"><i class="ti ti-sailboat"></i>해로</span>`; }

function render(){
  const q=searchEl.value.trim().toLowerCase();
  filtered=DATA.filter(d=>{
    return (curCat==="all"||d.cat===curCat)
        && (!curRoute||d.route.includes(curRoute))
        && (!q||d.title.includes(q)||d.origin.includes(q)||d.bg.includes(q));
  });
  document.getElementById("empty").style.display=filtered.length?"none":"block";
  grid.innerHTML=filtered.map((d,i)=>`
    <div class="card" onclick="openCard(${i})" role="button" tabindex="0">
      <div class="card-img">
        ${d.img?`<img src="${d.img}" alt="${d.title}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'card-emoji\\'>${d.emoji}</span>'">`:`<span class="card-emoji">${d.emoji}</span>`}
      </div>
      <div class="card-body">
        <span class="card-cat ${catClass(d.cat)}">${d.cat}</span>
        <div class="card-title">${d.title}</div>
        <div class="card-origin">${d.origin}</div>
        <div class="route-row">${d.route.map(rb).join("")}</div>
      </div>
    </div>`).join("");
}

function openCard(i){
  curIdx=i; renderModal();
  overlay.classList.add("open"); overlay.scrollTop=0;
}
function closeModal(){ overlay.classList.remove("open"); }

function renderModal(){
  const d=filtered[curIdx];
  modal.innerHTML=`
    <div class="modal-hero">
      ${d.img?`<img src="${d.img}" alt="${d.title}" onerror="this.parentElement.innerHTML='<span class=\\'modal-emoji\\'>${d.emoji}</span>'">`:`<span class="modal-emoji">${d.emoji}</span>`}
    </div>
    <div class="modal-body">
      <div class="modal-top">
        <div>
          <div class="modal-num">No.${d.id} · ${d.cat}</div>
          <div class="modal-title">${d.title}</div>
        </div>
        <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="meta-row">
        <span class="meta-tag"><i class="ti ti-map-pin"></i>${d.origin}</span>
        <span class="meta-tag"><i class="ti ti-clock"></i>${d.era}</span>
        ${d.route.map(rb).join("")}
      </div>
      <div class="section">
        <div class="section-label"><i class="ti ti-history"></i>역사적 배경 및 특징</div>
        <div class="section-body">${d.bg}</div>
      </div>
      <div class="section">
        <div class="section-label"><i class="ti ti-message-2"></i>홍보 멘트</div>
        <div class="promo-box">"${d.promo}"</div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" onclick="nav(-1)" ${curIdx===0?"disabled":""}><i class="ti ti-chevron-left"></i> 이전</button>
        <span class="nav-count">${curIdx+1} / ${filtered.length}</span>
        <button class="nav-btn" onclick="nav(1)" ${curIdx===filtered.length-1?"disabled":""}>다음 <i class="ti ti-chevron-right"></i></button>
      </div>
    </div>`;
}

function nav(d){ curIdx=Math.max(0,Math.min(filtered.length-1,curIdx+d)); renderModal(); overlay.scrollTop=0; }

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    if(btn.dataset.cat){
      curCat=btn.dataset.cat; curRoute=null;
      document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
    } else if(btn.dataset.route){
      const r=btn.dataset.route;
      if(curRoute===r){ curRoute=null; btn.classList.remove("active"); }
      else { curRoute=r; document.querySelectorAll("[data-route]").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); }
    }
    render();
  });
});

searchEl.addEventListener("input",render);
overlay.addEventListener("click",e=>{ if(e.target===overlay)closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape")close(); });
render();
</script>
</body>
</html>
